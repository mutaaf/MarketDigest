name: Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this. Please fill out the sections below so we can reproduce and fix the issue.

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of what went wrong.
      placeholder: "When I run `make digest-dry`, it crashes with..."
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect?
      description: What should have happened instead?
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the bug.
      placeholder: |
        1. Clone the repo
        2. Run `./setup.sh`
        3. Run `make digest-dry`
        4. See error...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Error output / logs
      description: Paste the relevant error message or log output.
      render: shell

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - macOS
        - Linux (Ubuntu/Debian)
        - Linux (Other)
        - Windows
        - Docker
    validations:
      required: true

  - type: input
    id: python-version
    attributes:
      label: Python version
      description: "Output of `python3 --version`"
      placeholder: "3.12.x"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: How did you install?
      options:
        - setup.sh
        - setup.bat
        - Docker
        - Manual
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Additional context, screenshots, config changes, etc.
