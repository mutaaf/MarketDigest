name: Feature Request
description: Suggest a new feature or improvement
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make Market Digest better? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the use case or pain point this feature addresses.
      placeholder: "I want to... but currently I have to..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: What's your proposed solution?
      description: Describe what the feature would look like and how it would work.
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any other approaches or workarounds you've thought about.

  - type: dropdown
    id: area
    attributes:
      label: Which area does this affect?
      options:
        - Scoring / Analysis
        - Data Sources / Fetchers
        - Digest (content / formatting)
        - Telegram Delivery
        - Web UI (Command Center)
        - Retrace / Performance Tracking
        - Configuration
        - Setup / Installation
        - Scheduling
        - Other
    validations:
      required: true

  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Screenshots, mockups, links to related projects, etc.
